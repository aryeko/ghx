query PrList(
  $owner: String!
  $name: String!
  $first: Int!
  $after: String
  $states: [PullRequestState!]
) {
  repository(owner: $owner, name: $name) {
    pullRequests(
      first: $first
      after: $after
      states: $states
      orderBy: { field: CREATED_AT, direction: DESC }
    ) {
      nodes {
        ...PrCoreFields
      }
      pageInfo {
        ...PageInfoFields
      }
    }
  }
}
