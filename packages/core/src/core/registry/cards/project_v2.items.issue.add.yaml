capability_id: project_v2.items.issue.add
version: "1.0.0"
description: Add an issue to a Projects v2 project.
input_schema:
  type: object
  required: [owner, projectNumber, issueUrl]
  properties:
    owner: { type: string, minLength: 1 }
    projectNumber: { type: integer, minimum: 1 }
    issueUrl: { type: string, minLength: 1 }
  additionalProperties: false
output_schema:
  type: object
  required: [itemId, itemType]
  properties:
    itemId: { type: string }
    itemType: { type: [string, "null"] }
  additionalProperties: false
routing:
  preferred: graphql
  fallbacks: [cli]
graphql:
  operationName: AddProjectV2Item
  operationType: mutation
  documentPath: src/gql/operations/project-v2-item-add.graphql
  resolution:
    lookups:
      - id: projectOrg
        operationName: ProjectV2OrgId
        documentPath: src/gql/operations/project-v2-org-id.graphql
        vars:
          org: owner
          projectNumber: projectNumber
      - id: projectUser
        operationName: ProjectV2UserId
        documentPath: src/gql/operations/project-v2-user-id.graphql
        vars:
          login: owner
          number: projectNumber
      - id: content
        operationName: ProjectV2IssueNodeId
        documentPath: src/gql/operations/project-v2-issue-node-id.graphql
        vars:
          url: issueUrl
    inject:
      - target: projectId
        source: first_scalar
        paths:
          - from_lookup: projectOrg
            path: organization.projectV2.id
          - from_lookup: projectUser
            path: user.projectV2.id
      - target: contentId
        source: scalar
        from_lookup: content
        path: resource.id
cli:
  command: project item-add
