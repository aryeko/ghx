capability_id: project_v2.items.issue.remove
version: "1.0.0"
description: Remove an issue from a Projects v2 project.
input_schema:
  type: object
  required: [owner, projectNumber, itemId]
  properties:
    owner: { type: string, minLength: 1 }
    projectNumber: { type: integer, minimum: 1 }
    itemId: { type: string, minLength: 1 }
  additionalProperties: false
output_schema:
  type: object
  required: [deletedItemId]
  properties:
    deletedItemId: { type: string, minLength: 1 }
  additionalProperties: false
routing:
  preferred: graphql
  fallbacks: [cli]
graphql:
  operationName: RemoveProjectV2Item
  operationType: mutation
  documentPath: src/gql/operations/project-v2-item-remove.graphql
  resolution:
    lookups:
      - id: projectOrg
        operationName: ProjectV2OrgId
        documentPath: src/gql/operations/project-v2-org-id.graphql
        vars:
          org: owner
          projectNumber: projectNumber
      - id: projectUser
        operationName: ProjectV2UserId
        documentPath: src/gql/operations/project-v2-user-id.graphql
        vars:
          login: owner
          number: projectNumber
    inject:
      - target: projectId
        source: first_scalar
        paths:
          - from_lookup: projectOrg
            path: organization.projectV2.id
          - from_lookup: projectUser
            path: user.projectV2.id
cli:
  command: project item-delete
